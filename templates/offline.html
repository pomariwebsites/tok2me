<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOK2ME - Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="text-center p-8">
        <div class="text-6xl mb-4">📡</div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">You're Offline</h1>
        <p class="text-gray-600 mb-4">Please check your internet connection and try again.</p>
        <button onclick="window.location.reload()" class="bg-green-500 text-white px-6 py-2 rounded-lg hover:bg-green-600">
            Retry
        </button>
    </div>
</body>
</html>
